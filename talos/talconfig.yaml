    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "dc:a6:32:d1:39:a2"
        dhcp: false
        addresses:
          - "192.168.1.52/24"
        routes:
          - gateway: "192.168.1.1"
            network: 0.0.0.0/0
        mtu: 1500
  - hostname: "rpi-wrk3"
