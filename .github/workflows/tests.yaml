---
name: Tests

on:
  push:
    branches: [main]
    paths:
      - "templates/scripts/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/tests.yaml"
      - ".mise.toml"
  pull_request:
    paths:
      - "templates/scripts/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/tests.yaml"
      - ".mise.toml"

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Run pytest
        run: uv run --with pytest --with makejinja pytest tests/

  shell:
    name: Shell tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Run bats tests
        run: bats tests/
