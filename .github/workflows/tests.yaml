---
name: Tests

on:
  push:
    branches: [main]
    paths:
      - "templates/scripts/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/tests.yaml"
      - ".mise.toml"
  pull_request:
    paths:
      - "templates/scripts/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/tests.yaml"
      - ".mise.toml"

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Run pytest
        run: uv run --with pytest --with makejinja pytest tests/

  shell:
    name: Shell tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Run bats tests
        run: bats tests/
