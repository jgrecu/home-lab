---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wg-easy
  namespace: network
spec:
  chartRef:
    kind: OCIRepository
    name: wg-easy
  interval: 1h
  values:
    controllers:
      wg-easy:
        containers:
          app:
            image:
              repository: ghcr.io/wg-easy/wg-easy
              # renovate: datasource=docker depName=ghcr.io/wg-easy/wg-easy
              tag: 14
            env:
              TZ: "Europe/Madrid"
              # External endpoint - must match current WG_HOST
              WG_HOST: "vpn.jgrecu.dev"
              # Web UI password
              PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: wg-easy-secret
                    key: admin-password
              # DNS server for VPN clients (Pi-hole)
              WG_DEFAULT_DNS: "192.168.1.166"
              # Split tunnel: route cluster and home networks through VPN
              WG_ALLOWED_IPS: "192.168.1.0/24, 10.42.0.0/16, 10.43.0.0/16"
              # Keepalive for NAT traversal
              WG_PERSISTENT_KEEPALIVE: "25"
              # Ports
              PORT: "51821"
              WG_PORT: "51820"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &webPort 51821
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *webPort
                  initialDelaySeconds: 15
                  periodSeconds: 10
            # WireGuard requires NET_ADMIN and SYS_MODULE capabilities
            securityContext:
              capabilities:
                add: ["NET_ADMIN", "SYS_MODULE"]
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
        pod:
          annotations:
            secret.reloader.stakater.com/reload: *app

    persistence:
      # WireGuard configuration, keys, and peer configs
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /etc/wireguard

    service:
      # Web UI - internal only
      web:
        controller: wg-easy
        ports:
          http:
            port: *webPort

      # WireGuard VPN - external LoadBalancer
      vpn:
        controller: wg-easy
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: "192.168.1.169"
        externalTrafficPolicy: Cluster
        ports:
          wireguard:
            port: 51820
            protocol: UDP
