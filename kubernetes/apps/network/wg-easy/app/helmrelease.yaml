---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wg-easy
  namespace: network
spec:
  chartRef:
    kind: OCIRepository
    name: wg-easy
  interval: 1h
  values:
    controllers:
      wg-easy:
        containers:
          app:
            image:
              repository: place1/wg-access-server
              # renovate: datasource=docker depName=place1/wg-access-server
              tag: latest
            env:
              TZ: "Europe/Madrid"
              # WireGuard configuration
              WG_WIREGUARD_PRIVATE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: wg-easy-secret
                    key: server-private-key
              WG_EXTERNAL_HOST: "vpn.jgrecu.dev"
              WG_PORT: "51820"
              # Admin credentials
              WG_ADMIN_USERNAME: "admin"
              WG_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: wg-easy-secret
                    key: admin-password-hash
              # Network configuration
              WG_ALLOWED_IPS: "192.168.1.0/24, 10.42.0.0/16, 10.43.0.0/16"
              WG_DEFAULT_DNS: "192.168.1.166"
              WG_KEEPALIVE: "25"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &webPort 8000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *webPort
                  initialDelaySeconds: 15
                  periodSeconds: 10
            # WireGuard requires privileged mode for network interface management
            securityContext:
              privileged: true
              capabilities:
                add: ["NET_ADMIN", "NET_RAW"]
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
        pod:
          annotations:
            secret.reloader.stakater.com/reload: *app
          # Use host network to access WireGuard interface
          hostNetwork: true

    persistence:
      # WireGuard configuration, keys, and peer configs
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /data

    service:
      # Web UI - internal only
      web:
        controller: wg-easy
        ports:
          http:
            port: *webPort

      # WireGuard VPN - external LoadBalancer
      vpn:
        controller: wg-easy
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: "192.168.1.169"
        externalTrafficPolicy: Cluster
        ports:
          wireguard:
            port: 51820
            protocol: UDP
