---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pihole
spec:
  chartRef:
    kind: OCIRepository
    name: pihole
  interval: 1h
  values:
    controllers:
      pihole:
        containers:
          app:
            image:
              repository: pihole/pihole
              tag: 2024.07.0
            env:
              TZ: "UTC"
              WEBPASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: pihole-secret
                    key: admin-password
              # Upstream DNS servers Pi-hole forwards to for non-blocked queries
              # k8s_gateway first for split DNS (cluster domains), then Cloudflare
              PIHOLE_DNS_: "192.168.1.56;1.1.1.1;1.0.0.1"
              DNSSEC: "true"
              # The hostname Pi-hole will recognise for its own web UI
              VIRTUAL_HOST: "pihole.${SECRET_DOMAIN}"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /admin/
                    port: &webPort 80
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /admin/
                    port: *webPort
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            # Pi-hole runs as root and needs NET_ADMIN for DNS/iptables management
            securityContext:
              capabilities:
                add: ["NET_ADMIN"]
            resources:
              requests:
                cpu: 20m
              limits:
                memory: 512Mi
        pod:
          annotations:
            secret.reloader.stakater.com/reload: *app
    persistence:
      # Pi-hole config, block lists, and gravity database.
      # Longhorn ensures these survive pod restarts and node failures.
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 2Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /etc/pihole
      # Custom DNS records and dnsmasq config snippets.
      dnsmasq:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /etc/dnsmasq.d
    service:
      # Web admin UI — routed through Envoy internal gateway
      web:
        ports:
          http:
            port: *webPort
      # DNS service — gets a dedicated LoadBalancer IP on your home network.
      # Cilium assigns this IP from its pool. After first deploy, check what
      # IP was assigned with: kubectl get svc -n network pihole-dns
      # Then point your router's DNS to that IP.
      dns:
        type: LoadBalancer
        annotations:
          # Pin a specific unused IP from your node_cidr so the DNS address
          # is stable. Set pihole_dns_addr in cluster.yaml.
          "lbipam.cilium.io/ips": "192.168.1.252"
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP
