---
# Main SecurityPolicy for all external routes - requires Authelia authentication
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authelia-external-auth
  namespace: network
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-external
  extAuth:
    http:
      backendRef:
        name: authelia
        namespace: security
        port: 9091
      headersToBackend:
        - Remote-User
        - Remote-Groups
        - Remote-Name
        - Remote-Email
      path: /api/verify?rd=https://auth.jgrecu.dev
---
# HTTPRoute-level bypass for echo app (used for testing/webhooks)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-bypass
  namespace: default
  annotations:
    gethomepage.dev/enabled: "false"  # Hide from homepage since it's for testing
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - echo.jgrecu.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          port: 80
---
# SecurityPolicy to bypass auth for echo
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authelia-bypass-echo
  namespace: default
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: echo-bypass
  # Empty extAuth section = no authentication required
---
# SecurityPolicy to bypass auth for Authelia itself (prevent circular dependency)
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authelia-bypass-self
  namespace: security
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: authelia
  # Empty extAuth section = no authentication required
