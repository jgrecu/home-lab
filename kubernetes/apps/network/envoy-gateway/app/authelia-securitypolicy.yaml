---
# Main SecurityPolicy for all external routes - requires Authelia authentication
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authelia-external-auth
  namespace: network
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-external
  extAuth:
    headersToExtAuth:
      - accept
      - cookie
      - authorization
      - x-forwarded-for
      - x-forwarded-proto
      - x-forwarded-host
      - x-forwarded-uri
    http:
      backendRef:
        name: authelia
        namespace: security
        port: 9091
      headersToBackend:
        - remote-user
        - remote-groups
        - remote-name
        - remote-email
      path: /api/authz/ext-authz/
