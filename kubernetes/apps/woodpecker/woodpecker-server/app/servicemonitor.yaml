---
apiVersion: v1
kind: Service
metadata:
  name: woodpecker-server-metrics
  labels:
    app.kubernetes.io/name: woodpecker-server
    app.kubernetes.io/component: metrics
spec:
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/controller: woodpecker-server
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: woodpecker-server
  labels:
    app.kubernetes.io/name: woodpecker-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: woodpecker-server
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
