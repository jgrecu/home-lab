---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner
rules:
  # Plugin: creates, watches, and deletes job pods
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Plugin: creates events for pod lifecycle tracking
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "get", "list", "watch"]
  # Plugin: creates PVCs for job workspace volumes
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Runner: reads secrets (registration token) and image pull secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Runner: reads ConfigMaps (podspecs, runner config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forgejo-runner
subjects:
  - kind: ServiceAccount
    name: forgejo-runner
