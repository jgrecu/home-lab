---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo-runner
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo-runner
  interval: 1h
  values:
    controllers:
      forgejo-runner:
        replicas: 2
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: code.forgejo.org/forgejo/runner
              tag: 12.8.2
            command: ["/bin/sh", "-c"]
            args:
              - |
                forgejo-runner register \
                  --no-interactive \
                  --instance "${FORGEJO_INSTANCE_URL}" \
                  --token "${FORGEJO_RUNNER_REGISTRATION_TOKEN}" \
                  --name "${HOSTNAME}" \
                  --labels "ubuntu-latest:docker://node:20-bullseye,ubuntu-22.04:docker://node:20-bullseye" \
                  2>/dev/null || true
                forgejo-runner daemon --config /data/config.yaml
            env:
              FORGEJO_INSTANCE_URL: "https://forgejo.${SECRET_DOMAIN}"
              FORGEJO_RUNNER_REGISTRATION_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-runner-secret
                    key: registration-token
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 512Mi
        pod:
          annotations:
            secret.reloader.stakater.com/reload: *app
    persistence:
      # Stores runner registration state (.runner file) and config per replica.
      # Each replica registers independently — 2 replicas = 2 concurrent jobs.
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /data
