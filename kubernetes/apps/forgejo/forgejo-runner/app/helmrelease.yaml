---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo-runner
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo-runner
  interval: 1h
  timeout: 10m
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              - op: replace
                path: /spec/template/spec/serviceAccountName
                value: forgejo-runner
            target:
              kind: Deployment
              name: forgejo-runner
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    controllers:
      forgejo-runner:
        replicas: 1
        strategy: Recreate
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
          annotations:
            secret.reloader.stakater.com/reload: *app
        # Builds eleboucher's runner fork + K8s plugin from source.
        # The upstream forgejo/runner does NOT support plugins or k8s labels.
        # eleboucher's fork adds pluginsv2 support and accepts arbitrary label schemes.
        # Both binaries are built from the plugin repo which pins the runner version.
        initContainers:
          build-binaries:
            image:
              repository: golang
              tag: 1.26-alpine
            command:
              - /bin/sh
              - -c
              - |
                set -e
                apk add --no-cache git

                # Clone the plugin repo (GitHub, reliable)
                git clone --depth 1 --branch v12.10.6 \
                  https://github.com/eleboucher/runner-k8s-plugin.git \
                  /tmp/plugin-src

                # Build the K8s plugin binary
                cd /tmp/plugin-src
                go build -o /plugin/forgejo-runner-k8s .
                chmod 755 /plugin/forgejo-runner-k8s

                # Build eleboucher's runner fork from the Go module cache.
                # The plugin's go.mod replaces the runner module with eleboucher's fork,
                # so it's already downloaded. We build it from the module cache.
                RUNNER_MOD=$(go list -m -f '{{.Dir}}' git.erwanleboucher.dev/eleboucher/runner/v12)
                cd "$${RUNNER_MOD}"
                go build -o /plugin/forgejo-runner ./cmd
                chmod 755 /plugin/forgejo-runner
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              # Root needed to apk add git packages
              runAsUser: 0
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
        containers:
          app:
            image:
              repository: alpine
              tag: "3.22"
            command: ["/bin/sh", "-c"]
            args:
              - |
                # Create runner config with K8s plugin backend
                cat > /data/config.yaml <<'EOF'
                log:
                  level: info
                runner:
                  capacity: 4
                  timeout: 3h
                container:
                  docker_host: "-"
                pluginsv2:
                  k8s:
                    path: /plugin/forgejo-runner-k8s
                    options:
                      namespace: forgejo
                      podspec: /config/podspec-default.yaml
                EOF

                # Force re-registration if runner was registered with upstream binary
                if [ -f /data/.runner ] && ! /plugin/forgejo-runner --config /data/config.yaml daemon --help >/dev/null 2>&1; then
                  rm -f /data/.runner
                fi

                if [ ! -f /data/.runner ]; then
                  /plugin/forgejo-runner register \
                    --no-interactive \
                    --instance "$FORGEJO_INSTANCE_URL" \
                    --token "$FORGEJO_RUNNER_REGISTRATION_TOKEN" \
                    --name "$HOSTNAME" \
                    --labels "ubuntu-latest:k8s:///config/podspec-default.yaml,ubuntu-22.04:k8s:///config/podspec-default.yaml"
                fi
                /plugin/forgejo-runner --config /data/config.yaml daemon
            env:
              FORGEJO_INSTANCE_URL: "http://forgejo-http.forgejo.svc.cluster.local:3000"
              FORGEJO_RUNNER_REGISTRATION_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-runner-secret
                    key: registration-token
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              runAsUser: 1000
              runAsGroup: 1000
            resources:
              requests:
                cpu: 15m
                memory: 64Mi
              limits:
                memory: 128Mi
    persistence:
      # Stores runner registration state (.runner file) and config per replica.
      # Each replica registers independently.
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /data
      # Shared emptyDir for the plugin binary built by the init container.
      plugin:
        type: emptyDir
        globalMounts:
          - path: /plugin
      # PodSpec YAML files for CI job pod customization.
      podspec:
        type: configMap
        name: forgejo-runner-podspecs
        globalMounts:
          - path: /config
            readOnly: true
