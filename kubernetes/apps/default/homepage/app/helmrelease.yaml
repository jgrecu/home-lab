---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  chartRef:
    kind: OCIRepository
    name: homepage
  interval: 1h
  values:
    controllers:
      homepage:
        strategy: RollingUpdate
        pod:
          serviceAccountName: homepage
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v0.9.10
            env:
              # Prevents DNS rebinding attacks — must match your actual hostname
              HOMEPAGE_ALLOWED_HOSTS: "homepage.${SECRET_DOMAIN}"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
    persistence:
      # Kubernetes integration config
      kubernetes-config:
        type: configMap
        name: homepage-config
        globalMounts:
          - path: /app/config/kubernetes.yaml
            subPath: kubernetes.yaml
            readOnly: true

      # User-editable config (bookmarks, custom services, settings)
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /app/config
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        # Using the internal gateway — Homepage is a private dashboard, not public
        hostnames: ["homepage.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
