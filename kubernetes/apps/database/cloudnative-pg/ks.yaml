---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
spec:
  dependsOn:
    - name: longhorn
      namespace: flux-system
    - name: garage
      namespace: flux-system
  interval: 1h
  path: ./kubernetes/apps/database/cloudnative-pg/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  # wait: true so any app with dependsOn: cloudnative-pg won't start
  # until the operator and its CRDs are fully installed
  wait: true
