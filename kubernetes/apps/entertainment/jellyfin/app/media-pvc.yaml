---
# PVC for Jellyfin media - binds to shared nfs-media-videos PV
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media
  namespace: entertainment
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""  # Empty to use static PV
  volumeName: nfs-media-videos  # Bind to shared static PV
  resources:
    requests:
      storage: 10Ti
