---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grimmory-backup
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/entertainment/grimmory/backup
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  dependsOn:
    - name: volsync
      namespace: storage
    - name: grimmory
