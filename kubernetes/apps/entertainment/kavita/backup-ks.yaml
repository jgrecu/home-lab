---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kavita-backup
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/entertainment/kavita/backup
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  dependsOn:
    - name: volsync
    - name: kavita
