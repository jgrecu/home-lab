---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: authelia-config-backup
  namespace: security
spec:
  sourcePVC: authelia-config
  trigger:
    schedule: "15 3 * * *"  # 3:15 AM daily
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: authelia-restic-secret
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
    retain:
      daily: 7
      weekly: 8
      monthly: 6
---
apiVersion: v1
kind: Secret
metadata:
  name: authelia-restic-secret
  namespace: security
type: Opaque
stringData:
  RESTIC_REPOSITORY: "s3:http://garage-s3.storage.svc.cluster.local:3900/volsync-backups/authelia-config"
  RESTIC_PASSWORD: "736b93e36e09c989cd9d960169f22d8730dca8142d58b5085bd9bd9871420ab9"
